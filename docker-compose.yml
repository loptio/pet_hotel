# Pet Hotel & Grooming System — local infra.
#
# S1 connects PostgreSQL ONLY. redis / rabbitmq / minio are defined so the
# environment is *ready* (per build-plan) but sit behind the "full" profile, so
# they do NOT start by default — they get wired in S4.
#     docker compose up -d                 # S1: postgres only (default)
#     docker compose --profile full up -d  # everything (pg + redis + rabbitmq + minio)
services:
  postgres:
    image: postgres:16-alpine
    container_name: pethotel-postgres
    environment:
      POSTGRES_USER: pethotel
      POSTGRES_PASSWORD: pethotel
      POSTGRES_DB: pethotel
    ports:
      # Host 5433 → container 5432 (avoids clashing with a host postgres on 5432).
      - "5433:5432"
    volumes:
      - pethotel-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pethotel -d pethotel"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --- env-ready, NOT wired in S1 (S4) ---
  redis:
    image: redis:7-alpine
    container_name: pethotel-redis
    ports:
      - "6379:6379"
    profiles: ["full"]

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: pethotel-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    profiles: ["full"]

  minio:
    image: minio/minio:latest
    container_name: pethotel-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - pethotel-minio:/data
    profiles: ["full"]

volumes:
  pethotel-pgdata:
  pethotel-minio:
